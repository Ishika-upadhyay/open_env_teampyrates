name: "ev-fleet-charging"
version: "0.1.0"
description: "EV Fleet Charging Simulator for the OpenEnv Hackathon"

environment: "environment:EVFleetAdapter"
action: "environment:EVAction"
observation: "environment:EVObservation"

tasks:
  - id: task_easy
    grader: "environment:grade_task"
    reset_params:
      difficulty: easy
  - id: task_medium
    grader: "environment:grade_task"
    reset_params:
      difficulty: medium
  - id: task_hard
    grader: "environment:grade_task"
    reset_params:
      difficulty: hard